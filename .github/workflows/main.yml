name: Transfer Google Factory Image

on:
  workflow_dispatch: # 手动触发运行

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Download from Google
        run: |
          # 使用 curl 下载谷歌镜像
          curl -L -o sargo-image.zip "https://dl.google.com/dl/android/aosp/sargo-sp2a.220505.008-factory-071e368a.zip"
          
      - name: Check SHA256
        run: |
          # 校验指纹确保下载完整
          echo "071e368a417684070a794b61ef0694e9639e44919539f046467005c28472f883 sargo-image.zip" | sha256sum -c

      - name: Upload to Actions Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pixel-3a-Factory-Image
          path: sargo-image.zip
          retention-days: 7 # 节省空间，只保留7天
